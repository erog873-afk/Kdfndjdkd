<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Stars App</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body{margin:0;padding:0;background:#0c0c0e;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;color:#fff;overflow-x:hidden}
p{font-size:large}
.bottom-nav{display:flex;justify-content:space-around;align-items:center;background:#161618;width:100%;position:fixed;bottom:0;left:0;padding:4px 0 24px;border-top:1px solid #252528;box-sizing:border-box;z-index:1000}
.nav-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;flex:1;-webkit-tap-highlight-color:transparent;user-select:none}
.nav-icon-container{width:36px;height:36px;margin-bottom:6px;display:flex;justify-content:center;align-items:center}
.nav-icon{width:25px;height:25px;object-fit:contain;filter:brightness(.65);transition:filter .15s linear}
.nav-item.active .nav-icon{filter:brightness(1.1)}
.nav-label{font-size:14px;font-weight:500;color:#8e8e93}
.nav-item.active .nav-label{color:#fff;font-weight:600}
.content-pages{width:100%;max-width:600px;flex:1;padding:16px;box-sizing:border-box}
.page-section{display:none;width:100%}
.page-section.active-page{display:block}
.section-title{font-size:32px;font-weight:300;margin:0 0 20px;letter-spacing:-.02em}
.current_balance{background:#49494c;display:flex;width:max-content;padding:4px 10px;border-radius:24px;margin:64px 0 16px auto}
#stars_balance_top{margin:0 0 0 12px;font-weight:bold}
.toast-container{position:fixed;top:calc(120px + env(safe-area-inset-top));left:12px;right:12px;z-index:9999}
.toast{background:#c62828;color:#fff;padding:18px 20px;border-radius:28px;font-size:17px;font-weight:500;display:flex;align-items:center;gap:14px;animation:slideDown .25s ease}
.toast.success{background:#2ea043}
.toast-icon{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600}
.toast.hide{opacity:0;transform:translateY(-10px);transition:.25s}
@keyframes slideDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}

.games-topbar{display:flex;align-items:center;gap:6px;margin:4px 0 20px}
.clover-badge{width:44px;height:44px;border-radius:50%;background:#ffffff1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.live-ticker-wrap{width:100%;overflow:hidden;border-radius:24px;background:#ffffff1a;margin-bottom:16px;position:relative}
.live-ticker-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 0}
.live-ticker-hdr-l{display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#30d158;animation:ldp 2s ease-in-out infinite}
@keyframes ldp{0%,100%{opacity:1}50%{opacity:.4}}
.live-ticker-hdr span{font-size:12px;font-weight:600}
.live-dot+span{color:#30d158}
.live-oc{color:#8e8e93;font-size:11px}
.live-ticker-track{overflow:hidden;padding:8px 0 10px}
.live-ticker{display:flex;gap:10px;width:max-content}
.ticker-item{display:flex;align-items:center;gap:8px;background:#49494c;border-radius:14px;padding:7px 12px 7px 7px;white-space:nowrap;flex-shrink:0;animation:fadeSlideIn .4s ease}
@keyframes fadeSlideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.ticker-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;background:#3a3a3d;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.ticker-name{font-size:12px;font-weight:600;color:#e6e6e6}
.ticker-act{font-size:11px;color:#8e8e93}
.ticker-act b{color:#ffd60a}
</style>
</head>
<body>
<div class="content-pages">
    <div class="current_balance">
        <img src="https://chimpbot.org/assets/stars-BaCoVmhq.svg" style="width:20px">
        <p id="stars_balance_top">0000,00</p>
    </div>
    <div id="page-earn" class="page-section active-page" data-page="Заработок"><h2 class="section-title">Заработок</h2></div>
    <div id="page-games" class="page-section" data-page="Игры">
        <div class="games-topbar">
            <div class="clover-badge">🍀</div>
        </div>
        <div class="live-ticker-wrap">
            <div class="live-ticker-hdr">
                <div class="live-ticker-hdr-l"><div class="live-dot"></div><span>LIVE</span></div>
                <span class="live-oc" id="onlineCount">0 игроков</span>
            </div>
            <div class="live-ticker-track">
                <div class="live-ticker" id="liveTicker"></div>
            </div>
        </div>
    </div>
    <div id="page-leaders" class="page-section" data-page="Лидеры"><h2 class="section-title">Лидеры</h2></div>
    <div id="page-shop" class="page-section" data-page="Магазин"><h2 class="section-title">Магазин</h2></div>
    <div id="page-profile" class="page-section" data-page="Профиль"><h2 class="section-title">Профиль</h2></div>
</div>
<nav class="bottom-nav">
    <div class="nav-item active" data-title="Заработок"><div class="nav-icon-container"><img src="star.png" class="nav-icon"></div><span class="nav-label">Заработок</span></div>
    <div class="nav-item" data-title="Игры"><div class="nav-icon-container"><img src="game.png" class="nav-icon"></div><span class="nav-label">Игры</span></div>
    <div class="nav-item" data-title="Лидеры"><div class="nav-icon-container"><img src="winer.png" class="nav-icon"></div><span class="nav-label">Лидеры</span></div>
    <div class="nav-item" data-title="Магазин"><div class="nav-icon-container"><img src="market.png" class="nav-icon"></div><span class="nav-label">Магазин</span></div>
    <div class="nav-item" data-title="Профиль"><div class="nav-icon-container"><img src="profile.png" class="nav-icon"></div><span class="nav-label">Профиль</span></div>
</nav>
<div class="toast-container" id="toasts"></div>
<script>
var S='https://chimpbot.org/assets/stars-BaCoVmhq.svg';
var tg=null;
if(window.Telegram&&window.Telegram.WebApp){tg=window.Telegram.WebApp;try{tg.expand();}catch(e){}}
var U=tg&&tg.initDataUnsafe?tg.initDataUnsafe.user:null;
var bal=1500;

function upd(){
    var f=bal.toString().replace(/\B(?=(\d{3})+(?!\d))/g,',');
    document.getElementById('stars_balance_top').textContent=f;
}
function toast(m,t){
    var c=document.getElementById('toasts'),d=document.createElement('div');
    d.className='toast'+(t==='success'?' success':'');
    d.innerHTML='<div class="toast-icon">'+(t==='success'?'✓':'✕')+'</div><div>'+m+'</div>';
    c.appendChild(d);
    setTimeout(function(){d.className+=' hide';setTimeout(function(){d.remove();},250);},2500);
}

(function(){
    var items=document.querySelectorAll('.nav-item');
    var bb=document.querySelector('.current_balance');
    var pg={'Заработок':document.getElementById('page-earn'),'Игры':document.getElementById('page-games'),'Лидеры':document.getElementById('page-leaders'),'Магазин':document.getElementById('page-shop'),'Профиль':document.getElementById('page-profile')};
    function vis(s){if(bb)bb.style.display=['Заработок','Магазин'].indexOf(s)>=0?'flex':'none';}
    function go(e){
        if(e.type==='touchstart'){if(this._th)return;this._th=true;setTimeout(function(el){el._th=false;}.bind(null,this),100);}
        if(this.classList.contains('active'))return;
        for(var i=0;i<items.length;i++)items[i].classList.remove('active');
        this.classList.add('active');
        var t=this.getAttribute('data-title');
        var keys=Object.keys(pg);
        for(var i=0;i<keys.length;i++){var p=pg[keys[i]];if(p)p.classList.remove('active-page');}
        if(pg[t])pg[t].classList.add('active-page');
        vis(t);
    }
    for(var i=0;i<items.length;i++){items[i]._th=false;items[i].addEventListener('touchstart',go,{passive:true});items[i].addEventListener('click',go);}
    vis('Заработок');
})();

(function(){
    var c=document.getElementById('liveTicker');
    if(!c)return;
    var players=[
        {n:'Артём К.',u:'@artem_k',c:'#e838c9'},{n:'Мария В.',u:'@masha_v',c:'#7b4cf5'},
        {n:'Дмитрий С.',u:'@dmitry_s',c:'#3a86ff'},{n:'Елена П.',u:'@elena_p',c:'#ff6b6b'},
        {n:'Сергей Н.',u:'@sergey_n',c:'#ffd60a'},{n:'Анна Л.',u:'@anna_l',c:'#30d158'},
        {n:'Никита О.',u:'@nikita_o',c:'#ff9f0a'},{n:'Ольга М.',u:'@olga_m',c:'#bf5af2'},
        {n:'Роман Т.',u:'@roman_t',c:'#64d2ff'},{n:'Ирина Д.',u:'@irina_d',c:'#ff375f'},
        {n:'Максим Б.',u:'@maxim_b',c:'#ac8e68'},{n:'Татьяна В.',u:'@tatyana_v',c:'#ff453a'},
        {n:'Андрей Г.',u:'@andrey_g',c:'#32d74b'},{n:'Виктория Е.',u:'@viktoria_e',c:'#5e5ce6'},
        {n:'Егор З.',u:'@egor_z',c:'#ff9f0a'},{n:'Дарья И.',u:'@daria_i',c:'#ff375f'},
        {n:'Кирилл К.',u:'@kirill_k',c:'#0a84ff'},{n:'Софья Р.',u:'@sofia_r',c:'#e838c9'},
        {n:'Тимур А.',u:'@timur_a',c:'#30d158'},{n:'Ксения Ш.',u:'@ksenia_sh',c:'#ff6b6b'},
        {n:'Захар Ю.',u:'@zakhar_yu',c:'#64d2ff'},{n:'Лев С.',u:'@lev_s',c:'#5e5ce6'},
        {n:'Вера Ф.',u:'@vera_f',c:'#ff453a'},{n:'Ильяс Х.',u:'@ilyas_h',c:'#30d158'}
    ];
    if(U){players[0]={n:U.first_name+(U.last_name?' '+U.last_name:''),u:U.username?'@'+U.username:'@you',c:'#30d158'};}
    var wins=[
        ['выиграл в рулетке','🎡'],['схватил джекпот','🎰'],['открыл кейс','📦'],
        ['умножил ставку','✨'],['забрал выигрыш','💸'],['поймал x10','🚀'],
        ['выиграл в краше','💣'],['получил приз','🎁']
    ];
    var onl=Math.floor(Math.random()*600)+800;
    document.getElementById('onlineCount').textContent=onl.toLocaleString('ru-RU')+' онлайн';
    setInterval(function(){onl+=Math.floor(Math.random()*7)-3;if(onl<700)onl=700;if(onl<1200)onl+=Math.floor(Math.random()*5);document.getElementById('onlineCount').textContent=onl.toLocaleString('ru-RU')+' онлайн';},8000);
    function rs(){var r=Math.random();if(r<.2)return Math.floor(Math.random()*100)+50;if(r<.5)return Math.floor(Math.random()*500)+100;if(r<.8)return Math.floor(Math.random()*2000)+500;return Math.floor(Math.random()*5000)+1000;}
    function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ');}
    function pick(a){return a[Math.floor(Math.random()*a.length)];}
    function mk(){
        var p=pick(players),w=pick(wins),s=rs();
        return '<div class="ticker-item"><div class="ticker-avatar" style="background:'+p.c+'">'+p.n[0]+'</div><div><div class="ticker-name">'+p.u+'</div><div class="ticker-act">'+w[1]+' '+w[0]+' <b>'+fmt(s)+' ⭐</b></div></div></div>';
    }
    function addWin(){
        if(c.children.length>6){c.removeChild(c.firstChild);}
        c.insertAdjacentHTML('beforeend',mk());
        var delay=8000+Math.floor(Math.random()*25000);
        setTimeout(addWin,delay);
    }
    setTimeout(addWin,3000+Math.floor(Math.random()*5000));
})();

upd();
</script>
</body>
</html>
